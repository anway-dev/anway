global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 12h
  receiver: 'anway-gateway'

receivers:
  - name: 'anway-gateway'
    webhook_configs:
      - url: 'http://gateway:8510/api/events/alert'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: anway-demo-webhook-token
