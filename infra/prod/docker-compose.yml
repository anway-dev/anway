services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: anway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anway"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: 'apoc'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  agent-service:
    build:
      context: ../..
      dockerfile: apps/agent-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8510:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      NEO4J_URI: ${NEO4J_URI}
      AGENT_SERVICE_URL: http://agent-service:8000
      ANWAY_ENCRYPTION_KEY: ${ANWAY_ENCRYPTION_KEY}
      ANWAY_WEBHOOK_TOKEN: ${ANWAY_WEBHOOK_TOKEN}
      ANWAY_WEBHOOK_TENANT: ${ANWAY_WEBHOOK_TENANT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-service:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8500:3000"
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://gateway:8510
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
