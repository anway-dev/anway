route:
  receiver: anvay
receivers:
  - name: anvay
    webhook_configs:
      # gateway runs on macOS host (not in Docker), so use host.docker.internal
      # For Linux hosts, replace with: http://172.17.0.1:4000/api/events/alert
      - url: http://host.docker.internal:4000/api/events/alert
        send_resolved: true
