apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: demo
  labels:
    app: payments-api
    team: payments
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
        team: payments
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: payments-api
          image: payments-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3010
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: demo
  labels:
    app: payments-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3010"
spec:
  selector:
    app: payments-api
  ports:
    - port: 3010
      targetPort: 3010
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api-nodeport
  namespace: demo
spec:
  selector:
    app: payments-api
  ports:
    - port: 3010
      targetPort: 3010
      nodePort: 30010
  type: NodePort
