services:
  # Demo microservices
  payments-api:
    build: ./services/payments-api
    ports: ["3010:3010"]
    networks: [demo]

  auth-service:
    build: ./services/auth-service
    ports: ["3011:3011"]
    networks: [demo]

  checkout-api:
    build: ./services/checkout-api
    ports: ["3012:3012"]
    networks: [demo]

  # Load gen + chaos
  load-gen:
    build: ./services/load-gen
    depends_on: [payments-api, auth-service, checkout-api]
    networks: [demo]

  chaos:
    build: ./services/chaos
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [payments-api, auth-service, checkout-api, gitea]
    networks: [demo]

  # Git (local GitHub replacement)
  gitea:
    image: gitea/gitea:latest
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__DOMAIN: gitea
      GITEA__server__ROOT_URL: http://gitea:3000/
    volumes:
      - gitea-data:/data
    ports: ["3030:3000"]
    networks: [demo]

  gitea-init:
    image: alpine:latest
    volumes:
      - ./gitea-init/init.sh:/init.sh:ro
    command: sh /init.sh
    depends_on: [gitea]
    networks: [demo]

  # Observability
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]
    networks: [demo]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]
    networks: [demo]

  loki:
    image: grafana/loki:latest
    ports: ["3100:3100"]
    networks: [demo]

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
    networks: [demo]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: anvay
      GF_SERVER_HTTP_PORT: 3001
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports: ["3001:3001"]
    networks: [demo]

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports: ["2375:2375"]
    networks: [demo]

volumes:
  gitea-data:

networks:
  demo:
    name: anvay-demo
    driver: bridge
