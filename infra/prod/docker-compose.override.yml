services:
  gateway:
    image: anway-gateway:latest
    ports:
      - "4000:4000"
    env_file:
      - ../gateway/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Runs inside the gateway container itself, against the port it
      # actually listens on (4000, per PORT/HOST above and the port
      # mapping's container side) — 8510 was the host-side mapping and was
      # never reachable from inside this container (confirmed live via
      # independent review, same class of bug as GATEWAY_URL below).
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: anway-web:latest
    ports:
      - "8500:3000"
    environment:
      - GATEWAY_URL=http://gateway:4000
    depends_on:
      - gateway
    restart: unless-stopped
