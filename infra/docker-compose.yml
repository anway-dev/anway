services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anway
      POSTGRES_PASSWORD: anway
      POSTGRES_DB: anway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/anwaypassword
      NEO4J_PLUGINS: 'apoc'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  agent-service:
    build:
      context: ..
      dockerfile: apps/agent-service/Dockerfile
    ports:
      - "8540:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: anwaypassword
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
