apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app: {{ .Release.Name }}-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-gateway
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.gateway.repository }}:{{ .Values.image.gateway.tag }}"
          imagePullPolicy: {{ .Values.image.gateway.pullPolicy }}
          ports:
            - containerPort: 4000
          env:
            - name: JWT_SECRET
              value: {{ .Values.env.jwtSecret | quote }}
            - name: ANVAY_ENCRYPTION_KEY
              value: {{ .Values.env.encryptionKey | quote }}
            - name: DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            - name: REDIS_URL
              value: {{ .Values.env.redisUrl | quote }}
            - name: OLLAMA_ENDPOINT
              value: {{ .Values.env.ollamaEndpoint | quote }}
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if .Values.loki.enabled }}
          volumeMounts:
            - name: varlog
              mountPath: /var/log
          {{- end }}
        {{- if .Values.loki.enabled }}
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
        {{- end }}
      {{- if .Values.loki.enabled }}
      volumes:
        - name: promtail-config
          configMap:
            name: {{ include "anvay.fullname" . }}-promtail
        - name: varlog
          emptyDir: {}
      {{- end }}
