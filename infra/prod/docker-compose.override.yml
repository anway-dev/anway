services:
  gateway:
    image: anvay-gateway:latest
    ports:
      - "4000:4000"
    env_file:
      - ../gateway/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: anvay-web:latest
    ports:
      - "3000:3000"
    environment:
      - GATEWAY_URL=http://gateway:4000
    depends_on:
      - gateway
    restart: unless-stopped
