# Dev stack — infra + gateway + web running in hot-reload mode with volume mounts
# Self-contained with dev defaults. Does not require infra/.env.
#
# Usage:
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# Prometheus is configured with container service names (gateway:4000) since
# both app services run inside the Docker network in this mode.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: anway_dev
      POSTGRES_USER: anway
      POSTGRES_PASSWORD: anway_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anway -d anway_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - anway-dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anway-dev

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "8530:9090"
    # NOTE: after any change to prometheus volumes or command args, the container
    # MUST be force-recreated (not just restarted). Docker compose `up -d` alone
    # does not recreate existing containers with new volume mounts.
    #   docker compose -f infra/docker-compose.dev.yml up -d --force-recreate prometheus
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anway-dev

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "8550:4317"
      - "8560:4318"
      - "8570:8888"
      - "8580:8889"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - anway-dev

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.dev.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - anway-dev

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki.dev.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anway-dev

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: anway_grafana_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:8520
    ports:
      - "8520:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anway-dev

  # Episodic knowledge layer — Graphiti (agent-service) + Neo4j. Confirmed
  # via independent review: these only existed in the PROD compose file, so
  # the dev stack (where all live verification happens) silently degraded
  # HybridKnowledgeGraph to structural-only and the temporal-reasoning
  # story ("what changed in the last hour before the alert?") had never
  # actually run where the product runs. AGENT_SERVICE_URL on the gateway
  # below activates the hybrid path (apps/gateway/src/kb/index.ts).
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/anway-dev-password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - anway-dev

  agent-service:
    build:
      context: ..
      dockerfile: apps/agent-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: anway-dev-password
      # Graphiti's episode extraction uses an LLM — same host-env passthrough
      # convention as the gateway's DEEPSEEK_API_KEY below. Any
      # OpenAI-COMPATIBLE endpoint works (e.g. DeepSeek:
      # OPENAI_API_KEY=$DEEPSEEK_API_KEY OPENAI_BASE_URL=https://api.deepseek.com
      # LLM_MODEL=deepseek-chat).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${DEEPSEEK_API_KEY:-}}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s
    networks:
      - anway-dev

  gateway:
    image: node:22
    working_dir: /app
    # IMPORTANT: tsx watch only watches gateway source — connector package changes
# need manual rebuild: pnpm build:connectors → then docker compose restart gateway
# Installs pnpm, runs workspace install, then starts gateway in hot-reload dev mode
    command: >-
      sh -c "apt-get update -qq && apt-get install -y -qq docker.io curl >/dev/null &&
             curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash >/dev/null &&
             curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/$(dpkg --print-architecture)/kubectl &&
             chmod +x /usr/local/bin/kubectl &&
             npm install -g pnpm@9.15.4 --quiet &&
             pnpm install &&
             pnpm --filter './packages/**' build && pnpm --filter './connectors/**' build &&
             pnpm --filter anway-gateway dev"
    environment:
      NODE_ENV: development
      PORT: "8510"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://anway:anway_dev_secret@postgres:5432/anway_dev
      REDIS_URL: redis://redis:6379
      # Dev-only defaults so `git clone && docker compose up` works with no manual .env.
      JWT_SECRET: dev-only-secret-anway-local-stack-min-32-chars-abc
      ANWAY_WEBHOOK_TOKEN: anway-demo-webhook-token
      ANWAY_ENCRYPTION_KEY: YW53YXktZGV2LWVuY3J5cHRpb24ta2V5LTMyYnl0ZXM=
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      LOG_LEVEL: info
      # Docker → host Ollama. Overrides the localhost-only .env default which
      # resolves to the container's own loopback when running in Docker.
      OLLAMA_ENDPOINT: http://host.docker.internal:11434/v1
      # Episodic layer (Graphiti via agent-service) — activates
      # HybridKnowledgeGraph in kb/index.ts. Gateway degrades gracefully to
      # structural-only if agent-service is down.
      AGENT_SERVICE_URL: http://agent-service:8000
      # Dev-only demo login (POST /api/auth/demo) — required by apps/web/e2e/fixtures.ts
      DEMO_MODE: "false"
      # Deploy Agent build stage — real registry to enable actual `docker build`
      # + `docker push` (Strategy B in pipeline.ts). Points at the host's
      # localhost:5000 via the mounted docker socket below (commands run
      # against the host daemon, so "localhost" here is the host's, not the
      # container's). Local-dev-only; a real deploy would point at a real
      # registry (ECR/GCR/ghcr.io) instead.
      DOCKER_REGISTRY: localhost:5000
      # DeepSeek key (Anthropic-compatible) — used for live-testing
      # LLM-backed agent flows (auto-triage, PRD/TechSpec chain) instead of
      # a mocked provider. Read from the host shell env, never committed —
      # a real live key was hardcoded here previously (confirmed live via
      # independent review), which meant every clone of this repo shipped a
      # working third-party credential in git history. Export
      # DEEPSEEK_API_KEY in your shell before `docker compose up` (or
      # prefix the command: `DEEPSEEK_API_KEY=sk-... docker compose ...`);
      # empty is a safe default — provider simply won't resolve, same as
      # any other unset provider key.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8510:8510"
    volumes:
      - ../:/app:delegated
      # Isolated named volumes — gateway never shares with web to avoid broken symlinks
      - gateway_nm:/app/apps/gateway/node_modules
      - gateway_root_nm:/app/node_modules
      # Docker-outside-of-Docker — lets the gateway's spawned `docker build`/
      # `docker push` (pipeline.ts build stage) talk to the host's real Docker
      # daemon instead of needing its own nested daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # K8s connector: mount kubeconfig + minikube certs at same host path so cert
      # file references in kubeconfig resolve inside the container.
      # create_host_path: true — safe on machines without minikube (creates empty dir).
      - type: bind
        source: ${HOME}/.kube
        target: ${HOME}/.kube
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME}/.minikube
        target: ${HOME}/.minikube
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8510/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 16
      start_period: 120s
    networks:
      - anway-dev

  web:
    image: node:22-slim
    working_dir: /app/apps/web
    # Production build (next build + next start) — NOT `next dev`. Dev mode
    # compiles each route on first visit, which surfaced as cold-compile
    # timeouts across the UI. `pnpm build` once, then `start` serves the
    # prebuilt output. Trade-off: code changes need a `docker compose up -d
    # --force-recreate web` to rebuild (no HMR).
    command: >-
      sh -c "npm install -g pnpm@9.15.4 --quiet &&
             cd /app && pnpm install &&
             cd /app/apps/web && pnpm build && pnpm start"
    environment:
      NODE_ENV: production
      PORT: "8500"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      # Server-side: use Docker service name to reach gateway inside the network
      GATEWAY_URL: http://gateway:8510
      # Client-side: browser reaches gateway on the host-mapped port
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8510
    ports:
      - "8500:8500"
    volumes:
      - ../:/app:delegated
      # Isolated named volumes — web never shares with gateway to avoid broken symlinks
      - web_root_nm:/app/node_modules
      - web_nm:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8500/api/providers',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 480s
    networks:
      - anway-dev

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  gateway_nm:
  gateway_root_nm:
  web_nm:
  web_root_nm:
  web_next:

networks:
  anway-dev:
    driver: bridge
