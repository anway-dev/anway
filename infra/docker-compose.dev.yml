# Dev stack — infra + gateway + web running in hot-reload mode with volume mounts
# Self-contained with dev defaults. Does not require infra/.env.
#
# Usage:
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# Prometheus is configured with container service names (gateway:4000) since
# both app services run inside the Docker network in this mode.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: anvay_dev
      POSTGRES_USER: anvay
      POSTGRES_PASSWORD: anvay_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anvay -d anvay_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - anvay-dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anvay-dev

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anvay-dev

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - anvay-dev

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: anvay_grafana_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anvay-dev

  gateway:
    image: node:22-slim
    working_dir: /app
    # Installs pnpm, runs workspace install, then starts gateway in hot-reload dev mode
    command: >-
      sh -c "npm install -g pnpm@9.15.4 --quiet &&
             pnpm install &&
             pnpm --filter anvay-gateway dev"
    environment:
      NODE_ENV: development
      PORT: "4000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://anvay:anvay_dev_secret@postgres:5432/anvay_dev
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    volumes:
      - ../:/app:delegated
      # Named volumes shadow host node_modules so container packages don't leak to host
      - gateway_nm:/app/apps/gateway/node_modules
      - root_nm:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 16
      start_period: 120s
    networks:
      - anvay-dev

  web:
    image: node:22-slim
    working_dir: /app/apps/web
    command: >-
      sh -c "npm install -g pnpm@9.15.4 --quiet &&
             cd /app && pnpm install &&
             cd /app/apps/web && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ../:/app:delegated
      - web_nm:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/providers || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    networks:
      - anvay-dev

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  gateway_nm:
  root_nm:
  web_nm:
  web_next:

networks:
  anvay-dev:
    driver: bridge
