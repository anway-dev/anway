apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-runner
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-runner
  namespace: demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-runner
  namespace: demo
subjects:
  - kind: ServiceAccount
    name: chaos-runner
    namespace: demo
roleRef:
  kind: Role
  name: chaos-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos
  namespace: demo
  labels:
    app: chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos
  template:
    metadata:
      labels:
        app: chaos
    spec:
      serviceAccountName: chaos-runner
      containers:
        - name: chaos
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "/scripts/chaos.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: scripts
          configMap:
            name: chaos-script
            defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-script
  namespace: demo
data:
  chaos.sh: |
    #!/bin/sh
    SERVICES="payments-api auth-service checkout-api"
    echo '{"level":"info","msg":"chaos injector started","target":"kubernetes"}'

    while true; do
      SLEEP=$((120 + RANDOM % 180))
      sleep "$SLEEP"

      # Pick a random service and delete a random pod (k8s restarts it automatically)
      SERVICES_ARR="payments-api auth-service checkout-api"
      IDX=$((RANDOM % 3))
      TARGET=$(echo $SERVICES_ARR | tr ' ' '\n' | sed -n "$((IDX+1))p")

      POD=$(kubectl get pods -n demo -l app=$TARGET -o name 2>/dev/null | head -1)
      if [ -n "$POD" ]; then
        kubectl delete $POD -n demo --grace-period=0 --force 2>/dev/null
        echo "{\"level\":\"warn\",\"msg\":\"pod killed\",\"service\":\"$TARGET\",\"pod\":\"$POD\"}"
      fi

      # Every 5th iteration: scale down to 0 then back up (simulates crash loop)
      if [ $((RANDOM % 5)) -eq 0 ]; then
        kubectl scale deployment $TARGET -n demo --replicas=0 2>/dev/null
        echo "{\"level\":\"error\",\"msg\":\"scale to zero\",\"service\":\"$TARGET\"}"
        sleep 30
        kubectl scale deployment $TARGET -n demo --replicas=2 2>/dev/null
        echo "{\"level\":\"info\",\"msg\":\"scale restored\",\"service\":\"$TARGET\"}"
      fi
    done
