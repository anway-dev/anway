groups:
  - name: anway
    interval: 30s
    rules:

      - alert: AnwayPodCrashLooping
        expr: |
          kube_pod_container_status_waiting_reason{
            reason="CrashLoopBackOff",
            namespace=~"anway.*"
          } > 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for >2m."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md#pod-oomkilled-or-crash-loop"

      - alert: AnwayHighErrorRate
        expr: |
          rate(http_requests_total{namespace=~"anway.*",status=~"5.."}[5m])
          /
          rate(http_requests_total{namespace=~"anway.*"}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Anway error rate >1%"
          description: "HTTP 5xx rate is {{ $value | humanizePercentage }} over the last 5m."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md#high-error-rate"

      - alert: AnwayDBConnectionsHigh
        expr: pg_stat_database_numbackends{datname="anway"} > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Anway DB connections high ({{ $value }})"
          description: "Postgres connections to anway DB exceed 80. PgBouncer or pool misconfiguration."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md#db-connections-exhausted"

      - alert: AnwayRedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Anway Redis memory high ({{ $value | humanizePercentage }})"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory. Risk of eviction."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md#redis-memory-high"

      - alert: AnwaySloBurnRateCritical
        expr: anway_slo_burn_rate_1h > 2
        for: 15m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "SLO burn rate critical ({{ $value }}x)"
          description: "Error budget burning at {{ $value }}x the safe rate. At this pace budget exhausts in {{ $value | humanizeDuration }}."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md#high-error-rate"

      - alert: AnwayGatewayDown
        expr: absent(up{job="anway-gateway"}) or up{job="anway-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Anway gateway is down"
          description: "No gateway scrape target found or target reports down for >1 minute."
          runbook: "https://github.com/YOUR_ORG/anway/blob/main/docs/RUNBOOK.md"
