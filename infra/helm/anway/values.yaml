replicaCount: 1

image:
  gateway:
    repository: anway/gateway
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: anway/web
    tag: latest
    pullPolicy: IfNotPresent

service:
  gateway:
    type: ClusterIP
    port: 4000
  web:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false
  className: nginx
  host: anway.example.com
  tls: []

env:
  jwtSecret: ""
  encryptionKey: ""
  databaseUrl: ""
  redisUrl: ""
  ollamaEndpoint: ""

postgres:
  enabled: true
  storageSize: 10Gi

redis:
  enabled: true
  storageSize: 1Gi

loki:
  enabled: false
  endpoint: http://loki:3100
