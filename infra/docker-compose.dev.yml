# Dev stack — infra + gateway + web running in hot-reload mode with volume mounts
# Self-contained with dev defaults. Does not require infra/.env.
#
# Usage:
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# Prometheus is configured with container service names (gateway:4000) since
# both app services run inside the Docker network in this mode.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: anvay_dev
      POSTGRES_USER: anvay
      POSTGRES_PASSWORD: anvay_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anvay -d anvay_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - anvay-dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anvay-dev

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "8530:9090"
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anvay-dev

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "8550:4317"
      - "8560:4318"
      - "8570:8888"
      - "8580:8889"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - anvay-dev

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.dev.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - anvay-dev

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki.dev.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anvay-dev

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: anvay_grafana_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:8520
    ports:
      - "8520:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anvay-dev

  gateway:
    image: node:22
    working_dir: /app
    # Installs pnpm, runs workspace install, then starts gateway in hot-reload dev mode
    command: >-
      sh -c "npm install -g pnpm@9.15.4 --quiet &&
             pnpm install &&
             pnpm --filter anvay-gateway dev"
    environment:
      NODE_ENV: development
      PORT: "8510"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://anvay:anvay_dev_secret@postgres:5432/anvay_dev
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      LOG_LEVEL: info
    ports:
      - "8510:8510"
    volumes:
      - ../:/app:delegated
      # Isolated named volumes — gateway never shares with web to avoid broken symlinks
      - gateway_nm:/app/apps/gateway/node_modules
      - gateway_root_nm:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8510/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 16
      start_period: 120s
    networks:
      - anvay-dev

  web:
    image: node:22-slim
    working_dir: /app/apps/web
    command: >-
      sh -c "npm install -g pnpm@9.15.4 --quiet &&
             cd /app && pnpm install &&
             cd /app/apps/web && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: "8500"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      # Server-side: use Docker service name to reach gateway inside the network
      GATEWAY_URL: http://gateway:8510
      # Client-side: browser reaches gateway on the host-mapped port
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8510
    ports:
      - "8500:8500"
    volumes:
      - ../:/app:delegated
      # Isolated named volumes — web never shares with gateway to avoid broken symlinks
      - web_root_nm:/app/node_modules
      - web_nm:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8500/api/providers || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    networks:
      - anvay-dev

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  gateway_nm:
  gateway_root_nm:
  web_nm:
  web_root_nm:
  web_next:

networks:
  anvay-dev:
    driver: bridge
