apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: demo
  labels:
    app: auth-service
    team: platform
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        team: platform
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3011"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3011
          readinessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: demo
  labels:
    app: auth-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3011"
spec:
  selector:
    app: auth-service
  ports:
    - port: 3011
      targetPort: 3011
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-nodeport
  namespace: demo
spec:
  selector:
    app: auth-service
  ports:
    - port: 3011
      targetPort: 3011
      nodePort: 30011
  type: NodePort
