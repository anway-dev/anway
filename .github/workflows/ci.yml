name: CI
on:
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit -p apps/gateway/tsconfig.json
      - run: npx tsc --noEmit -p apps/web/tsconfig.json
      - run: docker build -f apps/gateway/Dockerfile . -t anway-gateway:ci
      - run: docker build -f apps/web/Dockerfile . -t anway-web:ci
