name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to build and push images for'
        required: true
jobs:
  check:
    runs-on: ubuntu-latest
    # Real Postgres (pgvector-enabled, matching infra/docker-compose.dev.yml's
    # image exactly) + Redis service containers — previously `pnpm test` ran
    # with no DB/cache at all, so every DB-dependent gateway test fell back
    # to its own tolerant `expect([200, 500, 503])`-style assertion instead
    # of asserting real persisted data. With real services + real applied
    # migrations, those same tests now exercise the real path.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: anway_test
          POSTGRES_USER: anway
          POSTGRES_PASSWORD: anway_test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anway -d anway_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://anway:anway_test_secret@localhost:5432/anway_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-real-use-32chars
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fresh CI checkout has no built workspace dists — the apps resolve
      # @anway/* types via each package's dist/, so typechecking the apps
      # fails with TS2307 without this (confirmed on real run 29079070468).
      - run: pnpm turbo run build --filter='./packages/*' --filter='./connectors/*'
      - run: npx tsc --noEmit -p apps/gateway/tsconfig.json
      - run: npx tsc --noEmit -p apps/web/tsconfig.json
      # Non-interactive equivalent of `pnpm --filter anway-gateway run
      # db:migrate` (which wraps `prisma migrate dev`, an interactive
      # command that prompts on drift — wrong for CI). `migrate deploy`
      # applies existing migrations in order, no prompts, real schema.
      #
      # Confirmed live via independent review: bare `npx prisma` has no
      # locally pinned version to resolve on a fresh CI runner (pnpm does
      # not hoist apps/gateway's `prisma@^6.0.0` devDependency into the
      # workspace root's node_modules/.bin) and falls back to installing
      # `prisma@latest` (7.x) on the fly — the exact incompatibility this
      # session already hit locally verifying this same command (7.x
      # dropped the inline `datasource.url` schema format this project's
      # schema.prisma uses). `pnpm --filter anway-gateway exec` resolves
      # the workspace's own pinned 6.19.3 binary instead. Verified locally:
      # `pnpm --filter anway-gateway exec prisma --version` reports 6.19.3.
      - run: pnpm --filter anway-gateway exec prisma migrate deploy --schema prisma/schema.prisma
      # Confirmed live via independent review: this job previously never
      # ran any test suite at all — only typechecks and docker builds. A
      # real regression in any package's logic could merge without a
      # single vitest/pytest assertion running in CI.
      - run: pnpm test
      - run: docker build -f apps/gateway/Dockerfile . -t anway-gateway:ci
      - run: docker build -f apps/web/Dockerfile . -t anway-web:ci
  evals:
    # Agent output-quality evals (packages/agent/src/evals) — real,
    # non-mocked model calls scored by an LLM-as-judge against specific
    # rubrics. Confirmed live via independent review (finding I8) that this
    # suite existed but was never wired into CI at all. Gated on a model
    # key actually being configured as a repo/org secret; skip gracefully
    # rather than failing when none is set (e.g. on a fork's PR without
    # secrets access).
    #
    # Confirmed live via independent review (critical, second pass): the
    # `secrets` context is NOT allowed in a job-level `if:` — GitHub Actions
    # only permits `github`, `needs`, `vars`, and `inputs` contexts there.
    # The original `if: ${{ secrets.X != '' || ... }}` on this job made the
    # ENTIRE workflow file invalid — every job, including `check`, failed
    # in 0 seconds with "workflow file issue" on every push since this job
    # was added, so none of that work was ever actually validated by CI.
    # Fixed the standard way: no job-level `if`, a dedicated step computes
    # a boolean output from the secrets (env: has no context restriction),
    # and the real eval step is gated on that step's output instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for a configured model provider key
        id: check_key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$DEEPSEEK_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm --filter @anway/agent run eval
        if: steps.check_key.outputs.has_key == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  e2e:
    # Confirmed live via independent review: apps/web/e2e/ (dozens of
    # Playwright specs — auth, RBAC, security, terraform-ops, gate
    # approvals, ...) had a real `test:e2e` script but was never wired
    # into this workflow at all — only unit/connector tests (`check` job)
    # ran in CI. A real regression anywhere in the web UI or its
    # gateway-backed flows could merge without a single e2e assertion
    # running.
    #
    # playwright.config.ts hardcodes baseURL http://localhost:8500 and
    # apps/web/e2e/fixtures.ts's demo-login flow requires DEMO_MODE=true
    # on the gateway — both already true of infra/docker-compose.dev.yml
    # (the project's own documented self-contained dev stack, per
    # CLAUDE.md's two-compose-stack architecture), so this job boots that
    # stack directly rather than inventing a separate CI-only compose file.
    #
    # This is a first draft: unlike everything else fixed this session
    # (each verified against a real running instance before being called
    # done), this job's actual behavior on a real GitHub Actions runner
    # has not been observed — there is no way to trigger/watch a real
    # Actions run from this environment. Treat first-run failures as
    # expected iteration, not a sign the approach is wrong.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Boot the self-contained dev stack
        # `up --wait` hard-fails on any service without a healthcheck
        # (otel-collector) — confirmed on real run 29079070468. Boot detached
        # and wait on the two endpoints the e2e suite actually talks to.
        run: |
          docker compose -f infra/docker-compose.dev.yml up -d
          for i in $(seq 1 240); do
            if curl -sf http://localhost:8510/health >/dev/null 2>&1 && curl -sf http://localhost:8500 >/dev/null 2>&1; then
              echo "gateway + web healthy"; exit 0
            fi
            sleep 5
          done
          echo "stack did not become healthy in 1200s"
          docker compose -f infra/docker-compose.dev.yml ps
          docker compose -f infra/docker-compose.dev.yml logs --no-color gateway web | tail -100
          exit 1
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://anway:anway_dev_secret@localhost:5432/anway_dev
        run: pnpm --filter anway-gateway exec prisma migrate deploy --schema prisma/schema.prisma
      - name: Seed demo fixtures (users, connectors, entities e2e specs expect)
        env:
          DATABASE_URL: postgresql://anway:anway_dev_secret@localhost:5432/anway_dev
          SEED_DEMO: 'true'
        run: pnpm --filter anway-gateway run db:seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run e2e suite
        run: pnpm --filter anway-web run test:e2e
      - name: Upload Playwright traces/screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7
      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.dev.yml logs --no-color
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.dev.yml down -v

  build-and-push:
    # Only runs for the pipeline's workflow_dispatch trigger (apps/gateway/src/routes/pipeline.ts's
    # "Strategy A" build path — dispatches this workflow with { inputs: { sha } } and expects real
    # images tagged with that sha to land in a registry). PRs only need the type-check/build-only
    # `check` job above, not a push.
    if: github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -f apps/gateway/Dockerfile . -t ghcr.io/${{ github.repository_owner }}/anway-gateway:${{ inputs.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/anway-gateway:${{ inputs.sha }}
      - run: |
          docker build -f apps/web/Dockerfile . -t ghcr.io/${{ github.repository_owner }}/anway-web:${{ inputs.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/anway-web:${{ inputs.sha }}
