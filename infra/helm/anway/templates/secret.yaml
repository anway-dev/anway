apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-gateway-secrets
type: Opaque
data:
  JWT_SECRET: {{ .Values.gateway.secrets.JWT_SECRET | default "dev-secret-change-in-production" | b64enc | quote }}
  DATABASE_URL: {{ .Values.gateway.secrets.DATABASE_URL | default "" | b64enc | quote }}
  REDIS_URL: {{ .Values.gateway.secrets.REDIS_URL | default "" | b64enc | quote }}
  ANWAY_ENCRYPTION_KEY: {{ .Values.gateway.secrets.ANWAY_ENCRYPTION_KEY | default "" | b64enc | quote }}
  {{- if .Values.gateway.secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_API_KEY: {{ .Values.gateway.secrets.ANTHROPIC_API_KEY | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ .Values.gateway.secrets.OPENAI_API_KEY | b64enc | quote }}
  {{- end }}
