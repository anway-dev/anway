global:
  scrape_interval: 15s
scrape_configs:
  - job_name: payments-api
    static_configs:
      - targets: ['payments-api:3010']
  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:3011']
  - job_name: checkout-api
    static_configs:
      - targets: ['checkout-api:3012']
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
rule_files:
  - alerts.yml
