# Prometheus config scraping demo services exposed via minikube tunnel / NodePort
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape payments-api via minikube NodePort
  - job_name: payments-api
    static_configs:
      - targets:
          - "minikube:30010"
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: payments-api
      - target_label: team
        replacement: payments

  # Scrape auth-service via minikube NodePort
  - job_name: auth-service
    static_configs:
      - targets:
          - "minikube:30011"
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: auth-service
      - target_label: team
        replacement: platform

  # Scrape checkout-api via minikube NodePort
  - job_name: checkout-api
    static_configs:
      - targets:
          - "minikube:30012"
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: checkout-api
      - target_label: team
        replacement: checkout
