{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-web
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | default "letsencrypt-prod" }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  tls:
  - hosts:
    - {{ .Values.ingress.host | default "anway.local" }}
    secretName: {{ .Release.Name }}-tls
  rules:
  - host: {{ .Values.ingress.host | default "anway.local" }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-web
            port:
              number: {{ .Values.service.web.port | default 3000 }}
{{- end }}
