# Observability stack — Prometheus scrapes minikube services, Grafana visualises.
#
# Usage:
#   # Get minikube IP first
#   export MINIKUBE_IP=$(minikube ip)
#   docker compose -f infra/demo/docker-compose.observability.yml up -d
#
# Then open Grafana at http://localhost:8520 (admin / anvay)
# Prometheus at http://localhost:8530

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "8530:9090"
    volumes:
      - ./prometheus-k8s.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: anvay
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:8520
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/demo.json
    ports:
      - "8520:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - observability
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
