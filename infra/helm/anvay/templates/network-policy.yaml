apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-deny-all
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-gateway-egress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-gateway
  policyTypes: [Egress]
  egress:
  - ports:
    - port: 5432   # postgres
    - port: 6379   # redis
    - port: 7687   # neo4j
    - port: 443    # external APIs
    - port: 80
