global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'rules/anvay.yml'

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # In dev compose, gateway runs as a Docker service — use service name
  - job_name: 'anvay-gateway'
    static_configs:
      - targets: ['gateway:6900']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
