apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: demo
  labels:
    app: checkout-api
    team: checkout
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
        team: checkout
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3012"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: checkout-api
          image: checkout-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3012
          readinessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: demo
  labels:
    app: checkout-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3012"
spec:
  selector:
    app: checkout-api
  ports:
    - port: 3012
      targetPort: 3012
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api-nodeport
  namespace: demo
spec:
  selector:
    app: checkout-api
  ports:
    - port: 3012
      targetPort: 3012
      nodePort: 30012
  type: NodePort
